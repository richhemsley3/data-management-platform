<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beacon — Data Security Platform</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/charts.css">
</head>
<body>
  <!-- Skip to content -->
  <a href="#content" class="skip-to-content">Skip to main content</a>

  <!-- App Header -->
  <header class="app-header">
    <div class="header-logo">
      <div class="header-logo-mark">
        <svg viewBox="0 0 16 16"><path d="M8 1L2 4.5v7L8 15l6-3.5v-7L8 1z"/></svg>
      </div>
      <span class="header-logo-text">Beacon</span>
    </div>
    <div class="header-actions">
      <button class="header-help" title="Help" aria-label="Help">?</button>
      <div class="header-divider"></div>
      <button class="header-profile" aria-label="User menu">
        <span class="header-avatar">JC</span>
        <span class="header-username">Jordan Chen</span>
        <span class="header-chevron">
          <svg viewBox="0 0 14 14"><path d="M4 5.5l3 3 3-3"/></svg>
        </span>
      </button>
    </div>
  </header>

  <!-- Alert Ribbon -->
  <div class="alert-ribbon" id="alert-ribbon" hidden></div>

  <!-- App Layout -->
  <div class="app-layout">
    <nav class="app-sidebar" id="app-sidebar"></nav>
    <main class="app-content" id="content"></main>
  </div>

  <!-- Overlay container for modals/drawers -->
  <div id="overlay-container"></div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/state.js"></script>
  <script src="js/router.js"></script>
  <script src="js/components.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/flow1-connections.js"></script>
  <script src="js/flow2-scanning.js"></script>
  <script src="js/flow3-risk.js"></script>
  <script src="js/flow4-remediation.js"></script>
  <script src="js/flow5-policies.js"></script>
  <script src="js/flow6-monitoring.js"></script>
  <script src="js/flow7-onboarding.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
